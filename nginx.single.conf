# nginx config for single-container mode (nginx + uvicorn in same container)
# API requests are proxied to localhost:8001 (uvicorn)
server {
    listen 80;
    server_name _;

    # Increase timeouts for API calls
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Frontend — serve React build
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend — proxy API calls to uvicorn running on localhost
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
