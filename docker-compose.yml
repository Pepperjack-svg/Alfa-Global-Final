version: "3.8"

# =============================================================================
# Alfa Global Group — Docker Compose Stack
# For Dokploy: use "Docker Compose" build type and set env vars in the UI.
# =============================================================================

services:

  mongodb:
    image: mongo:7
    container_name: alfaglobal-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: alfaglobal-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://mongodb:27017}
      - DB_NAME=${DB_NAME:-alfaglobal}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-}
    container_name: alfaglobal-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
